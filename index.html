<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Lista zadań</title>
   <link rel="icon" href="images/icon.png">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet">
   <link href="css/style.css" rel="stylesheet">
   <link href="css/newTask.css" rel="stylesheet">
   <link href="css/list.css" rel="stylesheet">
   <link href="js/script.js" rel="script">
   <script defer src="js/script.js"></script>
</head>

<body class="body">
   <header class="header">
      <h1 class="header__title">Lista zadań</h1>
   </header>

   <div class="newTask">
      <h2 class="newTask__caption">
         Dodaj nowe zadanie
      </h2>
      <form class="newTask__form js-form">
         <input class="newTask__input js-newTask" id="textInput" placeholder="Co jest do zrobienia?">
         <button class="newTask__button js-newTaskButton">
            Dodaj zadanie
         </button>
      </form>
   </div>
   <div class="list">
      <h2 class="list__caption">
         Lista zadań
      </h2>
      <ul class="list__tasksContainer js-tasks"></ul>
      <br>
   </div>

</body>

</html>
